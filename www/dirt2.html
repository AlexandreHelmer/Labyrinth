<!doctype html>
<meta charset="utf-8" />
<title>Autotiles 4-bit — coins concaves/convexes + texture</title>
<style>
  body { background:#222; color:#ddd; font-family:system-ui; }
  .grid { display:flex; flex-wrap:wrap; gap:10px; }
  .tile { display:flex; flex-direction:column; align-items:center; }
  canvas { background:transparent; border:1px solid #555; }
  .label { margin-top:4px; font:12px/1 monospace; color:#ccc; }
</style>
<body>
<h3>Autotiles (NESW = 1,2,4,8)</h3>
<div id="tiles" class="grid"></div>
<script>
    
function noisyLine(ctx, x1, y1, x2, y2, amp=0, step_len=5) {
  //ctx.moveTo(x1, y1);
  
  if (amp === 0) {
      ctx.lineTo(x2,y2)
      return;
  }
  
  steps = Math.round(Math.sqrt((x2-x1)*(x2-x1) + (y2-y1)*(y2-y1))/step_len)
  const dx = (x2 - x1) / steps;
  const dy = (y2 - y1) / steps; 
  
  for (let i = 1; i < steps; i++) {
    const nx = x1 + dx * i;
    const ny = y1 + dy * i;
    const offset = (Math.random() - 0.5) * amp * 2;
    // décalage perpendiculaire
    const px = -dy;
    const py = dx;
    const norm = Math.sqrt(px*px + py*py) || 1;
    ctx.lineTo(nx + (px/norm)*offset, ny + (py/norm)*offset);
  }
  ctx.lineTo(x2,y2)
}

  const TILE = 64;
  // chemin etroit
  /*
  const m = 20; // marge entre le bord et le chemin
  const PATH = TILE - 2*m;             // largeur du chemin (branche/centre)
  const r= 13       // rayon des arrondis demandés
  const rext = 10  // rayon des arrondis exterieurs concaves
  */
  
  // chemin large
  const m = 10; // marge entre le bord et le chemin
  const PATH = TILE - 2*m;             // largeur du chemin (branche/centre)
  const r= 13       // rayon des arrondis demandés
  const rext = 6  // rayon des arrondis exterieurs concaves
  
  const borderWidth = 5
  const lineNoiseAmp = 1
  
  
  function rotate_quarter(ctx) {
    ctx.translate(TILE/2,TILE/2)
    ctx.rotate(0.5*Math.PI)
    ctx.translate(-TILE/2,-TILE/2)
  }
  
  function rot_matrix(angle=0) {
      const mat = new DOMMatrix()
      mat.translateSelf(TILE/2,TILE/2)
      mat.rotateSelf(angle)
      mat.translateSelf(-TILE/2,-TILE/2)
      return mat
  }
    
  function ext_border_path(ctx, mask) {
    const top    = (mask & 1);
    const right  = (mask & 2);
    const bottom = (mask & 4);
    const left   = (mask & 8);
    
    function corner_path(ctx, left, top) {
      if(left && top) {
        ctx.moveTo(0,m)
        noisyLine(ctx,0,m,m-rext,m,lineNoiseAmp)
        ctx.arc(m-rext, m-rext, rext, 0.5*Math.PI, 0, true);
        noisyLine(ctx,m,m-rext,m,0,lineNoiseAmp)
      }
      if (left && !top) {
        ctx.moveTo(0,m)
        noisyLine(ctx,0,m,TILE/2,m,lineNoiseAmp)
      } if (!left && top) {
        ctx.moveTo(m, TILE/2)
        noisyLine(ctx,m,TILE/2,m,0,lineNoiseAmp)
      } if (!left &&!top) {
        ctx.moveTo(m, TILE/2)
        noisyLine(ctx,m,TILE/2,m,m+r,lineNoiseAmp)
        ctx.arc(m+r,m+r,r,Math.PI,1.5*Math.PI)
        noisyLine(ctx,m+r,m,TILE/2,m,lineNoiseAmp)
      }
    }
    
    const p0 = new Path2D()
    
    let sides=[left,top,right,bottom,left]
    for (let i=0;i<4;i++) {
        p = new Path2D()
        corner_path(p, sides[i], sides[i+1])
        p0.addPath(p, rot_matrix(90*i))
    }
    return p0
  }
  
  function full_inside_path(ctx, mask) {
    const top    = (mask & 1);
    const right  = (mask & 2);
    const bottom = (mask & 4);
    const left   = (mask & 8);
    
    
    function corner_path(ctx, left, top) {
      // doit etre rempli avec fill, pas de stroke possible
      // top-left corner
      if(left && top) {
        
        ctx.moveTo(0,TILE/2)
        noisyLine(ctx,0,TILE/2,0,m,0)
        noisyLine(ctx,0,m,m-rext,m, lineNoiseAmp)
        ctx.arc(m-rext, m-rext, rext, 0.5*Math.PI, 0, true);
        noisyLine(ctx,m,m-rext,m,0, lineNoiseAmp)
        noisyLine(ctx,m,0,TILE/2,0,0)
        ctx.lineTo(TILE/2,TILE/2)
      }
      if (left && !top) {
        ctx.moveTo(0,TILE/2)
        ctx.lineTo(0,m)
        noisyLine(ctx,0,m,TILE/2,m,lineNoiseAmp)
        ctx.lineTo(TILE/2,TILE/2)
      }
      if (!left && top) {
        ctx.moveTo(m,TILE/2)
        noisyLine(ctx,m,TILE/2,m,0,lineNoiseAmp)
        ctx.lineTo(TILE/2,0)
        ctx.lineTo(TILE/2,TILE/2)
      }
      if (!left &&!top) {
        ctx.moveTo(m,TILE/2)
        noisyLine(ctx,m,TILE/2,m,m+r,lineNoiseAmp)
        ctx.arc(m+r,m+r,r,Math.PI,1.5*Math.PI)
        noisyLine(ctx,m+r,m,TILE/2,m,lineNoiseAmp)
        ctx.lineTo(TILE/2,TILE/2)
      }
    }
    
    let sides=[left,top,right,bottom,left]
    
    const p0 = new Path2D()
    for (let i=0;i<4;i++) {
        let p = new Path2D()
        corner_path(p, sides[i], sides[i+1])
       // rotate_path(p0, p)
        p0.addPath(p, rot_matrix(90*i))
        //rotate_quarter(ctx)
    }
    return p0
  }
  
  function drawBase(ctx, mask) {
    ctx.fillStyle = "#2990a4"
    //"#865e43"  
    p = full_inside_path(ctx, mask)
    ctx.fill(p)
  }
  
  function drawBorder(ctx, mask) {
    ctx.strokeStyle = "#ffd295"
    //"#533a2a"
    
    ctx.lineWidth = borderWidth
    ctx.lineJoin = "round"
    p = ext_border_path(ctx, mask)
    ctx.stroke(p)
  }


  function addSubtleTexture(ctx, qty, w=1, h=1) {
    // texture très légère, confinée à la zone peinte
    ctx.save();
    ctx.globalCompositeOperation = "source-atop";
    // points sombres clairsemés
    ctx.fillStyle = "rgba(0,0,0,0.1)";
    for (let i=0;i<qty;i++){
      ctx.fillRect(Math.random()*TILE, Math.random()*TILE, w, h);
    }
    // points clairs encore plus subtils
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    for (let i=0;i<qty;i++){
      ctx.fillRect(Math.random()*TILE, Math.random()*TILE, w, h);
    }
    ctx.restore();
  }

function drawTile(mask) {
    const c = document.createElement("canvas");
    c.width = TILE;
    c.height = TILE;
    const ctx = c.getContext("2d");

    drawBase(ctx, mask);
    addSubtleTexture(ctx,20, 5);

    const c2 = document.createElement("canvas");
    c2.width = TILE;
    c2.height = TILE;
    const ctx2 = c2.getContext("2d");
    
    drawBorder(ctx2, mask);
    addSubtleTexture(ctx2, 4000);

    ctx.drawImage(c2,0,0)
    return c;
}

  const host = document.getElementById("tiles");
  for (let m=0;m<16;m++){
    const wrap = document.createElement("div");
    wrap.className = "tile";
    const canvas = drawTile(m);
    const label = document.createElement("div");
    label.className = "label";
    label.textContent = String(m);
    wrap.appendChild(canvas);
    wrap.appendChild(label);
    host.appendChild(wrap);
    
    canvas.addEventListener("click", () => {
      const a = document.createElement("a");
      a.download = `${m}.png`;
      a.href = canvas.toDataURL("image/png");
      a.click();
    });
  }
</script>
</body>
