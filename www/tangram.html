<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Tangram</title>
  <link href="css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <link href="css/fontawesome-7.0.0.min.css" rel="stylesheet">
</head>
<body class="pt-0">

<!-- Écran d’accueil -->
<div id="homeTab" class="d-flex flex-column justify-content-center align-items-center text-center vh-100 bg-dark text-light">
  <h1 class="mb-5 p-4 btn-translucent-dark">Bienvenue</h1>
  
  <div class="d-grid gap-3 col-9 col-md-4">
    <button id="startBtn" class="btn btn-translucent-dark btn-lg" onclick="showModal('difficultyModal')">
      <i class="fas fa-play"></i> Nouvelle partie
    </button>
    <!--<button class="btn btn-translucent-dark btn-lg">
      <i class="fas fa-cog"></i> Paramètres
    </button>
    <button class="btn btn-translucent-dark btn-lg">
      <i class="fas fa-info-circle"></i> Crédits
    </button>-->
  </div>
</div>


<!-- Écran de jeu -->
<div id="gameTab" class="d-none flex-column">
  
<!-- Barre d'outils -->
<div class="bg-dark text-white p-2">
  <!-- Ligne du haut -->
  <div class="d-flex justify-content-between align-items-center mb-1">
    <span class="fw-bold">Le Tangram de Dimitri et Nicolas</span>
    <div class="d-flex align-items-center">
      <span id="timer" class="me-2">--:--</span>

      <!-- Menu 3 points -->
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-light" type="button" data-bs-toggle="dropdown">
          <i class="fas fa-ellipsis-v"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li>
            <a class="dropdown-item d-flex align-items-center" href="#" data-bs-toggle="modal" data-bs-target="#difficultyModal">
              <i class="fas fa-fw fa-gamepad me-2"></i> Nouvelle partie
            </a>
          </li>
          <li>
            <a class="dropdown-item d-flex align-items-center text-danger" href="#" id="btnQuitter">
              <i class="fas fa-fw fa-sign-out-alt me-2"></i> Quitter
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Ligne du bas -->
  <div class="d-flex justify-content-between">
    <!-- Gauche -->
    <button id="btnPauseResume" class="btn btn-sm btn-outline-warning">
      <i class="fas fa-pause"></i> Pause
    </button>

    <!-- Droite -->
    <div>
      <button id="btnResetZoom" class="btn btn-sm btn-outline-light me-1" onclick="resetZoom()">
        <i class="fas fa-search-minus"></i>
      </button>
        <button onclick="exportFigure()" class="btn btn-dark btn-lg">
          <i class="fas fa-download"></i>
        </button>
    </div>
  </div>
</div>

<div id="game-container" style="position:relative; overflow:hidden; touch-action:none; background: url('images/tilesets/tile_floor/20.png') repeat center center;">
  <div id="canvas-wrapper" style="transform-origin: 0 0;">
    <canvas id="mainCanvas"></canvas>
  </div>

  <!-- Flèches overlay -->
<!-- Contrôles directionnels -->
<div id="controls" class="d-none"
     style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); text-align:center;">
<div>
  <button onclick="rotateLeft()" class="btn btn-translucent-dark btn-lg me-2">
    <i class="fas fa-undo"></i>
  </button>
  <button onclick="rotateRight()" class="btn btn-translucent-dark btn-lg me-2">
    <i class="fas fa-redo"></i>
  </button>
  <button onclick="mirrorH()" class="btn btn-translucent-dark btn-lg me-2">
    <i class="fas fa-arrows-alt-h"></i>
  </button>
  <button onclick="mirrorV()" class="btn btn-translucent-dark btn-lg">
    <i class="fas fa-arrows-alt-v"></i>
  </button>

</div>
</div>

<!-- Overlay de pause -->
  <div id="pauseOverlay" class="d-none justify-content-center align-items-center text-white"
       style="position:absolute; inset:0; background: rgba(0,0,0,0.6); font-size:2rem; z-index:10; transition: opacity 0.3s;">
    <div class="text-center">
      <i class="fas fa-pause-circle fa-3x mb-3"></i>
      <div>Jeu en pause</div>
    </div>
  </div>
</div>
</div>

</div>

<!-- === MODALE NOUVELLE PARTIE === -->
<div class="modal fade" id="difficultyModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-3 text-center bg-dark text-light">
      <h5 class="mb-3">Nouvelle partie</h5>

        <div id="loadingMenu" class="spinner-border text-light" role="status">
        </div>
      <!-- Choix du skin -->
      <div class="dropdown mb-3 mx-auto" id="skinMenu"></div>
      
      <!-- Choix du theme -->
      <div class="dropdown mb-3 mx-auto" id="targetMenu"></div>

      <!-- Choix de la difficulté -->
      <div class="dropdown mb-3 mx-auto" id="difficultyMenu"></div>

      <button id="startButton" class="btn btn-success" onclick="startGame()" disabled>Démarrer</button>
    </div>
  </div>
</div>

<!-- === MODALE FIN DE JEU === -->
<div class="modal fade" id="victoryModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-3 bg-dark text-light">
      <div class="modal-header">
        <h5 class="modal-title">
          Bravo!
        </h5>
      </div>
      <div class="modal-body">
        <span id="victoryMessage"></span>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-success" data-bs-dismiss="modal">OK</button>
      </div>
    </div>
  </div>
</div>

<script src="cordova.js"></script>
<script src="js/bootstrap_utils.js"></script>
<script src="js/timer.js"></script>
<script src="js/board.js"></script>
<script src="js/sounds.js"></script>
<script src="js/tangram.js"></script>
<script src="js/images.js"></script>
<script>
/* === CONFIGURATION === */
const CONFIG = {
  gameplay: {
    difficulty: "easy"
  },
  skin: "cat",
  theme: "classic",
  target: "heart"
};


/* === VARIABLES === */
let canvas=document.getElementById("mainCanvas")
let ctx=canvas.getContext("2d");



let gameActive=false;
let isPaused = false;


const THEMES = {
  mouse: {
    icon: "mouse.png",
    player: "mouse2.png",
    goal: "cheese.png",
    label: "Souris"
  },
  cat: {
    icon: "cat.png",
    player: "cat.png",
    goal: "milk.png",
    label: "Chat"
  },
  
};


const DIFFICULTY = {
  easy:   {
    label: "Facile",
    icon: "icons/icon-green-64.png" // show picture w/ colors
  },
  difficult: {
    label: "Difficile", // show pic in black
    icon: "icons/icon-red-64.png"
  }
};



// UI functions

  // Quitter
  document.getElementById("btnQuitter").addEventListener("click", function () {
    if (confirm("Voulez-vous vraiment quitter ?")) {
      quitGame()
    }
  });
  
// Pause / Resume toggle
const pauseBtn = document.getElementById("btnPauseResume")
pauseBtn.addEventListener("click", function () {
    if (isPaused) {
      resumeGame()
    } else {
      pauseGame()
    }
  });

// Toggle controls
function showControls() {
  document.getElementById("controls").classList.replace("d-none", "d-flex");
}
function hideControls() {
  document.getElementById("controls").classList.replace("d-flex", "d-none");
}
  
/* Zoom et affichage */

const wrapper = document.getElementById("canvas-wrapper");
const container = document.getElementById("game-container");

let targetImgData = null;
function loadTarget(name) {
  
  targetImgData = Tangram.renderFigureToImage(Tangram.makePiecesArray(Tangram.FIGURES[name].pieces), 250, 20, CONFIG.gameplay.difficulty==="easy")
  ctx.putImageData(targetImgData,0,0)
}
function rotateLeft() {
  const obj = Tangram.getSelectedObject();
  if (obj) {
    Tangram.rotate(obj.name, -Math.PI/8); // sens antihoraire
    updateScene()
  }
}

function rotateRight() {
  const obj = Tangram.getSelectedObject();
  if (obj) {
    Tangram.rotate(obj.name, Math.PI/8); // sens horaire
    updateScene()
  }
}

function mirrorH() {
  const obj = Tangram.getSelectedObject();
  if (obj) {
    Tangram.mirrorH(obj.name);
    updateScene()
  }
}

function mirrorV() {
  const obj = Tangram.getSelectedObject();
  if (obj) {
    Tangram.mirrorV(obj.name);
    updateScene()
  }
}

function exportFigure() {
  console.log(JSON.stringify(Tangram.exportFigure()))
  
  S = 256
  const cvs = document.createElement("canvas");
  cvs.width = S;
  cvs.height = S;
  const ctx = cvs.getContext("2d");
  let imgData = Tangram.renderFigureToImage(Tangram.makePiecesArray(Tangram.FIGURES[CONFIG.target].pieces), S, 20, true)
  ctx.putImageData(imgData,0,0)
  
      const link = document.createElement('a');
      link.download = `miniature-${CONFIG.target}.png`;
      link.href = cvs.toDataURL('image/png');
      document.body.appendChild(link);
      link.click();
      link.remove();
}

function moveObject(name, x, y) {
  Tangram.move(name,x,y)
  Tangram.selectObjectAt(x,y)
  showControls()
  updateScene()
}

function clickBoard(x,y) {
  Tangram.selectObjectAt(x,y)
  updateScene()
  if (Tangram.getSelectedObject())
    showControls()
  else
    hideControls()
}

function updateScene() {
  //if(!gameActive || isPaused) return false;
  Tangram.redrawScene()
  checkMatch()
}

function checkMatch() {
  result = Tangram.matchCurrentFigureWith(CONFIG.target, 0.02)
  if (result.match) {
    canvas.style.border="2px solid lightgreen"
    winGame()
  }
  else {
    canvas.style.border="2px solid red"
  }
  ctx.putImageData(targetImgData,0,0)
}

const gameBoard = new GameBoard(canvas, container, wrapper, 
 Tangram.getObjectAt,
 moveObject,
 clickBoard
);
gameBoard.MAX_SCALE = 1





/* === TIMER === */
function display_time(seconds, is_result) {
  seconds = Math.floor(seconds); // on garde des entiers
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;

  const parts = [];
  if (is_result) {
    if (h > 0) parts.push(String(h)+" heure"+(h>1?"s":""))
    if (m > 0) parts.push(String(m)+" minute"+(m>1?"s":""))
    parts.push(String(s)+" seconde"+(s>1?"s":""))
    return parts.join(" ");
  }
  else {
    if (h > 0) parts.push(`${h}`);
    parts.push(String(m).padStart(2,"0"))
    parts.push(String(s).padStart(2,"0"))
    return parts.join(":");
  }
}



const gameTimer = new GameTimer((seconds) => {
  document.getElementById("timer").innerText = display_time(seconds, false);
});

const pauseOverlay = document.getElementById('pauseOverlay');

// Afficher l'overlay avec fade
function showPauseOverlay() {
  pauseOverlay.classList.remove('d-none');
  pauseOverlay.classList.add('d-flex');
  pauseOverlay.style.opacity = 1;
}

// Cacher l'overlay avec fade
function hidePauseOverlay() {
  pauseOverlay.style.opacity = 0;
  pauseOverlay.classList.remove('d-flex');
  pauseOverlay.classList.add('d-none');
}


/* === START GAME === */
async function startGame(){
  const size = DIFFICULTY[CONFIG.gameplay.difficulty].size

  canvas.width= 1000;
  canvas.height= 1200;
  Tangram.initTangram(canvas);
  
  loadTarget(CONFIG.target)
  gameActive=true;
  isPaused = false;
  
  
  stopAllMusic();
  playMusic("bgm");
  
  document.getElementById("timer").innerText = "--:--"
  hideModals()
  hidePauseOverlay()
  document.getElementById("homeTab").classList.replace('d-flex','d-none')
  document.getElementById("gameTab").classList.replace('d-none','d-flex')
  
  gameBoard.resetZoom();
  gameTimer.reset();
  gameTimer.start();
}

function winGame() {
    if (!gameActive || isPaused) return false;

    gameActive=false;
    gameTimer.pause()
    
    stopAllMusic();
    playSound("win")
    
    document.querySelector("#victoryModal #victoryMessage")
      .innerHTML=`Tu as gagné en ${display_time(gameTimer.elapsedBeforePause, true)} !`
    setTimeout(()=>showModal("victoryModal"),100)
}

function quitGame() {
  gameActive=false;
    
  stopAllMusic();
    
  document.getElementById("gameTab").classList.replace('d-flex','d-none')
  document.getElementById("homeTab").classList.replace('d-none','d-flex')
  
}

function pauseGame() {
  if (!isPaused && gameActive) {
    isPaused = true;
    gameTimer.pause();
    showPauseOverlay();
    pauseBtn.innerHTML = '<i class="fas fa-play"></i> Reprendre';
  }
}

function resumeGame() {
  if (isPaused) {
    isPaused = false;
    gameTimer.start();
    hidePauseOverlay();
    pauseBtn.innerHTML = '<i class="fas fa-pause"></i> Pause';
  }
}

function resetZoom() {
  gameBoard.resetZoom()
}
// Gestion pour navigateur classique
window.addEventListener('blur', () => {
  pauseGame();
});

// Gestion pour Cordova
document.addEventListener('deviceready', () => {
  document.addEventListener('pause', () => {
    pauseGame();
  }, false);
});

document.addEventListener("DOMContentLoaded", () => {
  //preloadAllSkins(() => {
    document.getElementById("loadingMenu").classList.add( "d-none")
//    buildMenu(SKINS, CONFIG.skin, "skinMenu", (sk)=>{CONFIG.skin = sk})
    buildMenu(Tangram.FIGURES, CONFIG.target, "targetMenu", (th)=>{CONFIG.target = th})
    buildMenu(DIFFICULTY, CONFIG.gameplay.difficulty, "difficultyMenu", (th)=>{CONFIG.gameplay.difficulty = th})
    document.getElementById("startButton").disabled = false
 // });
});

</script>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
