<!DOCTYPE html>
<html lang="fr">
<head>
<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Icônes Canvas 64px téléchargeables</title>
  <style>
    body { background:#111; color:#eee; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif; }
    h1 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 .5rem; }
    .grid { display: grid; grid-template-columns: repeat(4, 80px); gap: 16px; align-items: center; justify-content: start; }
    .icon-wrap { width:64px; height:64px; display:inline-block; }
    .icon-link { display:inline-block; border-radius: 14px; padding: 8px; background: rgba(255,255,255,.04); transition: transform .12s ease, background .12s ease; }
    .icon-link:hover { transform: translateY(-2px); background: rgba(255,255,255,.08); }
    .caption { text-align:center; font-size:.8rem; opacity:.85; margin-top:.25rem; }
  </style>
</head>
<body>
  <h1>Icônes 64×64 (fond transparent) — cliquez pour télécharger</h1>  <div class="grid" id="icons">
    <div>
      <a class="icon-link" id="link-red" download="icon-red-64.png" href="#"><canvas id="icon-red" class="icon-wrap" width="64" height="64"></canvas></a>
      <div class="caption">Rouge</div>
    </div>
    <div>
      <a class="icon-link" id="link-green" download="icon-green-64.png" href="#"><canvas id="icon-green" class="icon-wrap" width="64" height="64"></canvas></a>
      <div class="caption">Vert</div>
    </div>
    <div>
      <a class="icon-link" id="link-orange" download="icon-orange-64.png" href="#"><canvas id="icon-orange" class="icon-wrap" width="64" height="64"></canvas></a>
      <div class="caption">Orange</div>
    </div>
    <div>
      <a class="icon-link" id="link-yellow" download="icon-yellow-64.png" href="#"><canvas id="icon-yellow" class="icon-wrap" width="64" height="64"></canvas></a>
      <div class="caption">Jaune</div>
    </div>
  </div>  <script>
    // Utilities
    function hexToRgb(hex){
      hex = hex.replace('#','');
      if(hex.length===3){ hex = hex.split('').map(c=>c+c).join(''); }
      const num = parseInt(hex,16);
      return { r:(num>>16)&255, g:(num>>8)&255, b:num&255 };
    }
    function rgbToHex({r,g,b}){
      const h = n => n.toString(16).padStart(2,'0');
      return `#${h(r)}${h(g)}${h(b)}`;
    }
    function mix(hex, amt){ // amt in [-1,1]
      const {r,g,b} = hexToRgb(hex);
      const m = v => Math.max(0, Math.min(255, Math.round(v + (amt>0 ? (255 - v)*amt : v*amt))));
      return rgbToHex({r:m(r), g:m(g), b:m(b)});
    }

    function setupHiDPI(canvas){
      const ratio = Math.max(1, Math.floor(window.devicePixelRatio || 1));
      const w = canvas.width, h = canvas.height;
      if (ratio > 1) {
        canvas.width = w * ratio; canvas.height = h * ratio;
        canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
        const ctx = canvas.getContext('2d');
        ctx.setTransform(ratio,0,0,ratio,0,0);
      }
    }

    function renderIcon(canvas, baseHex){
      setupHiDPI(canvas);
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0,0,64,64); // transparent bg

      const cx = 32, cy = 32, r = 16; // centered circle, diameter 32px

      // Subtle drop shadow (modern soft)
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.35)';
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 2;

      // Radial gradient (lighter center, darker edge)
      const edge = mix(baseHex, -0.22);
      const center = mix(baseHex, +0.18);
      const grad = ctx.createRadialGradient(cx-4, cy-6, 2, cx, cy, r);
      grad.addColorStop(0, center);
      grad.addColorStop(1, edge);

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();

      // Inner highlight ring (flat-ish gloss)
      ctx.beginPath();
      ctx.arc(cx, cy, r-0.5, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Subtle top specular
      const specGrad = ctx.createRadialGradient(cx-6, cy-5, 0, cx-6, cy-10, 10);
      specGrad.addColorStop(0, 'rgba(255,255,255,0.55)');
      specGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.arc(cx, cy-4, r-2, Math.PI*1.05, Math.PI*1.95);
      ctx.lineWidth = 0;
      ctx.fillStyle = specGrad;
      ctx.fill();

      // Outer ring for definition
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(0,0,0,0.45)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    const icons = [
      { id: 'icon-red',    link: 'link-red',    color: '#e53935' },
      { id: 'icon-green',  link: 'link-green',  color: '#43a047' },
      { id: 'icon-orange', link: 'link-orange', color: '#fb8c00' },
      { id: 'icon-yellow', link: 'link-yellow', color: '#fdd835' }
    ];

    function updateDownloadLink(canvas, anchor){
      const url = canvas.toDataURL('image/png');
      anchor.href = url; // clicking downloads (thanks to download="…")
    }

    function init(){
      icons.forEach(({id, link, color}) => {
        const c = document.getElementById(id);
        renderIcon(c, color);
        const a = document.getElementById(link);
        updateDownloadLink(c, a);
      });
    }

    window.addEventListener('load', init);
  </script></body>
</html>
